<!DOCTYPE html>
<html>
<head>
  <base href="/LeftNewsGrabberProject/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The Radical | High-Signal News Dashboard">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="The Radical">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>The Radical | News Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* This makes the loading screen match your app background while the engine starts */
    body {
      background-color: #0e0e0e;
      margin: 0;
    }
  </style>
</head>
<body>
  <script>
    // This script intercepts the Flutter bootstrap process to force the HTML renderer.
    // This fixes the "Random Image" / CORS issue and removes the need for terminal flags.
    window.addEventListener('load', function(ev) {
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            renderer: "html", // Forces the browser to use standard HTML images
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <!-- The flutter_bootstrap.js is now handled by the script above -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
